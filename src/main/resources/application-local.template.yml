spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/products_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

server:
  port: 8080

jwt:
  secret-key: test-secret-key-at-least-32-characters-long

management:
  influx:
    metrics:
      export:
        uri: http://localhost:8086
        org: product-manager-org
        bucket: product-manager
        token: product-manager-influx-token
        step: 30s
